controller:
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  installPlugins:
    - git:latest
    - workflow-aggregator:latest
    - docker-workflow:latest
    - kubernetes:latest
    - sonar:latest
    - aws-credentials:latest
    - pipeline-stage-view:latest
    - blueocean:latest
    - credentials-binding:latest
    - amazon-ecr:latest

  javaOpts: "-Xms512m -Xmx2048m"
  adminPassword: "admin123"

  # IRSA annotation — Jenkins uses the IAM role directly, no static keys needed
  podAnnotations:
    eks.amazonaws.com/role-arn: "JENKINS_IRSA_ARN_PLACEHOLDER"

persistence:
  enabled: true
  storageClass: "gp2"
  size: "20Gi"

agent:
  enabled: true
  namespace: jenkins
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  podAnnotations:
    eks.amazonaws.com/role-arn: "JENKINS_IRSA_ARN_PLACEHOLDER"

serviceAccount:
  create: false
  name: jenkins
  annotations:
    eks.amazonaws.com/role-arn: "JENKINS_IRSA_ARN_PLACEHOLDER"
