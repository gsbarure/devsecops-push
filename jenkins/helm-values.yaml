controller:
  serviceType: LoadBalancer
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  installPlugins:
    - git:latest
    - workflow-aggregator:latest
    - docker-workflow:latest
    - kubernetes:latest
    - sonar:latest
    - aws-credentials:latest
    - pipeline-stage-view:latest
    - blueocean:latest
    - credentials-binding:latest
  javaOpts: "-Xms512m -Xmx2048m"
  adminPassword: "admin123"

persistence:
  enabled: true
  storageClass: "gp2"
  size: "20Gi"

agent:
  enabled: true
  namespace: jenkins
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

serviceAccount:
  create: false
  name: jenkins
