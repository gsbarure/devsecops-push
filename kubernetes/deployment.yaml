apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  namespace: dev
  labels:
    app: devsecops-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: devsecops-app
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: devsecops-app
          image: ACCOUNT_ID.dkr.ecr.us-west-2.amazonaws.com/devsecops-app:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: devsecops-app-config
          env:
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: devsecops-app-secret
                  key: app-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
