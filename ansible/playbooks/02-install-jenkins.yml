---
- name: Install Jenkins on EKS via Helm (with IRSA for ECR — no static credentials)
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get Jenkins IRSA ARN from Terraform
      command: terraform output -raw jenkins_irsa_arn
      args:
        chdir: "{{ playbook_dir }}/../../terraform"
      register: jenkins_irsa_arn
      changed_when: false

    - name: Patch helm-values.yaml with real IRSA ARN
      replace:
        path: "{{ playbook_dir }}/../../jenkins/helm-values.yaml"
        regexp: 'JENKINS_IRSA_ARN_PLACEHOLDER'
        replace: "{{ jenkins_irsa_arn.stdout }}"

    - name: Add Jenkins Helm repo
      command: helm repo add jenkins https://charts.jenkins.io
      changed_when: false
      ignore_errors: true

    - name: Update Helm repos
      command: helm repo update
      changed_when: false

    - name: Install Jenkins via Helm
      command: >
        helm upgrade --install jenkins jenkins/jenkins
        --namespace {{ jenkins_namespace }}
        --create-namespace
        --values {{ playbook_dir }}/../../jenkins/helm-values.yaml
        --wait
        --timeout 10m
      changed_when: true

    - name: Wait for Jenkins pod to be ready
      command: kubectl rollout status deployment/jenkins -n {{ jenkins_namespace }} --timeout=300s
      changed_when: false

    - name: Get Jenkins LoadBalancer URL
      command: >
        kubectl get svc jenkins -n {{ jenkins_namespace }}
        -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
      register: jenkins_url
      changed_when: false
      retries: 15
      delay: 20
      until: jenkins_url.stdout != ""

    - name: Save Jenkins URL
      copy:
        content: "http://{{ jenkins_url.stdout }}:8080"
        dest: "{{ playbook_dir }}/../../.jenkins_url"
        mode: '0644'

    - name: Jenkins access details
      debug:
        msg:
          - "╔══════════════════════════════════════════╗"
          - "║  JENKINS INSTALLED                       ║"
          - "║  URL      : http://{{ jenkins_url.stdout }}:8080"
          - "║  Username : admin / admin123"
          - "║  IRSA ARN : {{ jenkins_irsa_arn.stdout }}"
          - "║  ECR push : fully automated via IRSA     ║"
          - "╚══════════════════════════════════════════╝"
